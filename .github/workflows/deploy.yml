# アプリを EC2 にデプロイ（git pull → composer → migrate → 再起動）
# Secrets: AWS_ROLE_ARN, SSH_PRIVATE_KEY, TF_VAR_DB_PASSWORD
name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show run context (原因特定用)
        run: |
          echo "=========================================="
          echo "トリガーしたコミット: ${{ github.sha }}"
          echo "コミットメッセージ: ${{ github.event.head_commit.message }}"
          echo "このワークフローには Composer 自動インストールが含まれています。"
          echo "※ 「composer: command not found」が出る実行は古いものです。"
          echo "   → Actions の「Deploy to EC2」で「Run workflow」から手動実行すると最新版が使われます。"
          echo "=========================================="

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Get EC2 IP from SSM
        id: ec2
        run: |
          set -e
          IP=$(aws ssm get-parameter --name "/atte/test/ec2_public_ip" --query Parameter.Value --output text --region ap-northeast-1)
          echo "ip=$IP" >> $GITHUB_OUTPUT
          if [ -z "$IP" ]; then
            echo "::error::SSM に EC2 IP がありません。先に Terraform を apply してください。"
            exit 1
          fi
          echo "EC2 IP: $IP"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          head -1 ~/.ssh/deploy_key.pem | grep -q "BEGIN.*PRIVATE KEY" || (echo "::error::SSH_PRIVATE_KEY の形式が不正です。Terraform の ec2_private_key_pem を改行含めてそのまま登録してください。" && exit 1)
          ssh-keyscan -H ${{ steps.ec2.outputs.ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        env:
          EC2_IP: ${{ steps.ec2.outputs.ip }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 ec2-user@$EC2_IP << REMOTE
            set -e
            echo "==> [workflow commit: ${GITHUB_SHA}] (このコミットのワークフローで実行中)"
            echo "==> cd /var/www/html"
            cd /var/www/html || { echo "::error::/var/www/html がありません。EC2 の user_data を確認してください。" && exit 1; }
            if [ ! -d .git ]; then
              echo "==> git clone (初回)"
              sudo git clone -b main https://github.com/${GITHUB_REPO}.git .
            fi
            echo "==> git fetch & reset"
            sudo git fetch origin main
            sudo git reset --hard origin/main
            echo "==> ensure Composer (PATH に依存しない)"
            if ! sudo test -x /usr/local/bin/composer; then
              echo "Installing Composer..."
              sudo bash -c 'cd /tmp && curl -sS https://getcomposer.org/installer | /usr/bin/php && mv composer.phar /usr/local/bin/composer && chmod +x /usr/local/bin/composer'
            fi
            sudo /usr/local/bin/composer --version || { echo "::error::Composer の確認に失敗しました。" && exit 1; }
            echo "==> cd src && composer install"
            cd src
            sudo /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
            echo "==> migrate"
            sudo /usr/bin/php artisan migrate --force
            sudo chown -R nginx:nginx storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            echo "==> restart php-fpm nginx"
            sudo systemctl restart php-fpm nginx
            echo "==> Deploy done"
          REMOTE
