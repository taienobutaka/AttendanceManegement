# アプリを EC2 にデプロイ（git pull → composer → migrate → 再起動）
# Secrets: AWS_ROLE_ARN, SSH_PRIVATE_KEY, TF_VAR_DB_PASSWORD（RDS フォールバック時）, LARAVEL_APP_KEY（SSM 未作成時フォールバック）
# SSM /atte/test/deploy/* は Terraform で作成（フル plan で EC2 が差し替わる場合は -target で SSM のみ apply 可）
name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/github-deploy-ec2.sh'
      - 'scripts/build-ec2-env-from-ssm.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show run context (原因特定用)
        run: |
          echo "=========================================="
          echo "トリガーしたコミット: ${{ github.sha }}"
          echo "コミットメッセージ: ${{ github.event.head_commit.message }}"
          echo "このワークフローには Composer 自動インストールが含まれています。"
          echo "※ 「composer: command not found」が出る実行は古いものです。"
          echo "   → Actions の「Deploy to EC2」で「Run workflow」から手動実行すると最新版が使われます。"
          echo "=========================================="

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Get EC2 IP from SSM
        id: ec2
        run: |
          set -e
          IP=$(aws ssm get-parameter --name "/atte/test/ec2_public_ip" --query Parameter.Value --output text --region ap-northeast-1)
          echo "ip=$IP" >> $GITHUB_OUTPUT
          if [ -z "$IP" ]; then
            echo "::error::SSM に EC2 IP がありません。先に Terraform を apply してください。"
            exit 1
          fi
          echo "EC2 IP: $IP"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          head -1 ~/.ssh/deploy_key.pem | grep -q "BEGIN.*PRIVATE KEY" || (echo "::error::SSH_PRIVATE_KEY の形式が不正です。Terraform の ec2_private_key_pem を改行含めてそのまま登録してください。" && exit 1)
          ssh-keyscan -H ${{ steps.ec2.outputs.ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # SSM が無い場合は RDS API + Secrets（TF_VAR_DB_PASSWORD / LARAVEL_APP_KEY）にフォールバック
      - name: Build .env (SSM 優先、無ければ RDS + Secrets)
        env:
          AWS_REGION: ap-northeast-1
          EC2_IP: ${{ steps.ec2.outputs.ip }}
          DEPLOY_SSM_PREFIX: /atte/test/deploy
          DEPLOY_RDS_INSTANCE_ID: atte-test
          DEPLOY_DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD }}
          DEPLOY_LARAVEL_APP_KEY: ${{ secrets.LARAVEL_APP_KEY }}
          DEPLOY_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          python3 "${GITHUB_WORKSPACE}/scripts/build-ec2-env-from-ssm.py" \
            "${DEPLOY_SSM_PREFIX}" \
            "${RUNNER_TEMP}/.env.deploy" \
            --app-url "http://${EC2_IP}"
          test -s "${RUNNER_TEMP}/.env.deploy"

      - name: Upload .env to EC2
        env:
          EC2_IP: ${{ steps.ec2.outputs.ip }}
        run: |
          set -e
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
            "${RUNNER_TEMP}/.env.deploy" ec2-user@"${EC2_IP}":/tmp/.env.deploy

      - name: Deploy to EC2
        env:
          EC2_IP: ${{ steps.ec2.outputs.ip }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -e
          test -f "${GITHUB_WORKSPACE}/scripts/github-deploy-ec2.sh"
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
            ec2-user@"${EC2_IP}" \
            env GITHUB_REPO="${GITHUB_REPO}" GITHUB_SHA="${GITHUB_SHA}" \
            bash -s < "${GITHUB_WORKSPACE}/scripts/github-deploy-ec2.sh"
