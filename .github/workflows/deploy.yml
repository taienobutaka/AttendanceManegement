# アプリを EC2 にデプロイ（git pull → composer → migrate → 再起動）
# Secrets: AWS_ROLE_ARN, SSH_PRIVATE_KEY, TF_VAR_DB_PASSWORD
name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Get EC2 IP from SSM
        id: ec2
        run: |
          IP=$(aws ssm get-parameter --name "/atte/test/ec2_public_ip" --query Parameter.Value --output text 2>/dev/null || echo "")
          echo "ip=$IP" >> $GITHUB_OUTPUT
          if [ -z "$IP" ]; then
            echo "::warning::SSM に EC2 IP がありません。先に Terraform を apply してください。"
            exit 1
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ steps.ec2.outputs.ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        env:
          EC2_IP: ${{ steps.ec2.outputs.ip }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=accept-new ec2-user@$EC2_IP << REMOTE
            set -e
            cd /var/www/html || exit 1
            if [ ! -d .git ]; then
              sudo git clone -b main https://github.com/${GITHUB_REPO}.git .
            fi
            sudo git fetch origin main
            sudo git reset --hard origin/main
            cd src
            sudo composer install --no-dev --optimize-autoloader --no-interaction
            sudo php artisan migrate --force
            sudo chown -R nginx:nginx storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            sudo systemctl restart php-fpm nginx
          REMOTE
